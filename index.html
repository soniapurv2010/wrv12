<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Railways v12 — MSTS Route</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Bebas+Neue&family=Noto+Sans:ital,wght@0,300;0,400;0,600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060a0f;--surface:#0c1420;--card:#101c2e;
  --border:#1e3a5f;--accent:#f97316;--accent2:#0ea5e9;
  --text:#e2eaf4;--muted:#7a99bb;--green:#22c55e;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif}

/* NAV */
nav{position:fixed;top:0;width:100%;height:60px;display:flex;justify-content:space-between;align-items:center;padding:0 5vw;background:rgba(6,10,15,.9);border-bottom:1px solid var(--border);z-index:100}
.nav-brand{font-family:'Bebas Neue';font-size:1.5rem;color:var(--accent)}
.nav-brand span{color:var(--accent2)}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:var(--muted);text-decoration:none;font-family:'Rajdhani';font-size:.85rem}
.nav-links a:hover{color:var(--accent)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 5vw 80px}
.hero-title{font-family:'Bebas Neue';font-size:clamp(4rem,12vw,9rem)}
.hero-title span{color:var(--accent)}
.hero-tagline{margin-top:1rem;max-width:500px;color:var(--muted)}

.btn-primary{background:var(--accent);color:#fff;padding:.8rem 2rem;text-decoration:none}

/* SECTION */
section{padding:100px 5vw}
.section-title{font-family:'Bebas Neue';font-size:clamp(2.5rem,5vw,4rem)}
.section-title span{color:var(--accent2)}

.divider{height:1px;background:var(--border)}

/* VIDEO */
.video-wrapper{
  max-width:900px;margin:auto;
  aspect-ratio:16/9;border:1px solid var(--border);
  overflow:hidden;background:var(--card)
}
.video-wrapper iframe{
  width:100%;height:100%;border:none
}

/* FOOTER */
footer{padding:40px 5vw;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">WR<span>v12</span></div>
  <div class="nav-links">
    <a href="#video">Video</a>
    <a href="#pricing">Pricing</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-title">Western <span>Railways</span></div>
  <p class="hero-tagline">
    Experience 2500+ KM of detailed Indian railway simulation.
  </p>
  <a href="#video" class="btn-primary">Watch Preview</a>
</section>

<div class="divider"></div>

<!-- VIDEO -->
<section id="video">
  <div class="section-title">Watch the <span>Route</span></div>

  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/yOnU3WJ3yb4?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</section>

<div class="divider"></div>

<!-- PRICING -->
<section id="pricing">
  <div class="section-title">Pricing</div>
  <p style="margin-top:1rem;color:var(--muted)">
    Upgrade: ₹600–₹800 | New: ₹1600
  </p>
</section>

<!-- FOOTER -->
<footer>
  <div>Western Railways v12</div>
  <div>© 2026</div>
</footer>

</body>
</html>
